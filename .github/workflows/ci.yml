name: AI Accuracy CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install dev dependencies if any
        pip install requests httpx pytest

    - name: Run Evidence Verification (Regression Test)
      # We skip actual API calls to OpenAI if secrets aren't set, 
      # but verify_evidence.py requires it. 
      # We need to make sure secrets are available in repo.
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Check if OPENAI key exists
        if [ -z "$OPENAI_API_KEY" ]; then
          echo "WARNING: OPENAI_API_KEY secret not found. Skipping evidence tests."
        else
          python verify_evidence.py
        fi

        # Check if GEMINI key exists for Vision tests
        if [ -z "$GEMINI_API_KEY" ]; then
          echo "WARNING: GEMINI_API_KEY secret not found. Skipping vision tests."
        else
          python verify_vision.py
        fi
