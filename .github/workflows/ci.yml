name: AI Accuracy CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install dev dependencies if any
        pip install requests httpx pytest

    - name: Run Evidence Verification (Regression Test)
      # We skip actual API calls to OpenAI if secrets aren't set, 
      # but verify_evidence.py requires it. 
      # We need to make sure secrets are available in repo.
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Check if OPENAI key exists
        if [ -z "$OPENAI_API_KEY" ]; then
          echo "WARNING: OPENAI_API_KEY secret not found. Skipping evidence tests."
        else
          python verify_evidence.py
        fi

    - name: Run backend vision tests
      if: env.GEMINI_API_KEY != ''
      run: |
        cd "Digital Filing Cabinet"
        python verify_vision.py

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
        env:
          ADMIN_PASSWORD: admin
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
