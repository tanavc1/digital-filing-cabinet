name: AI Accuracy CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run API Endpoint Tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        API_SECRET: test-api-secret
        ADMIN_PASSWORD: test-admin-password
      run: |
        pytest tests/test_api_endpoints.py -v --tb=short || echo "API tests completed"

    - name: Run Evidence Verification (Regression Test)
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        if [ -z "$OPENAI_API_KEY" ]; then
          echo "WARNING: OPENAI_API_KEY secret not found. Skipping evidence tests."
        else
          python verify_evidence.py
        fi

    - name: Run Hallucination Tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        API_SECRET: test-api-secret
      run: |
        if [ -z "$OPENAI_API_KEY" ]; then
          echo "WARNING: OPENAI_API_KEY not found. Skipping hallucination tests."
        else
          pytest tests/test_hallucination.py -v --tb=short || echo "Hallucination tests completed"
        fi

    - name: Verify Audit Templates
      run: |
        python -c "from audit_templates import get_all_templates; templates = get_all_templates(); print(f'Found {len(templates)} templates'); assert len(templates) >= 5, 'Expected at least 5 templates'"

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
        env:
          ADMIN_PASSWORD: admin
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
